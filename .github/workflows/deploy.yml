name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: meta
        run: |
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          echo "owner_lc=${owner_lc}" | tee -a "$GITHUB_OUTPUT"
          echo "tag=ghcr.io/${owner_lc}/fulcrum:${{ github.sha }}" | tee -a "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.tag }}
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/fulcrum:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy Komodo stack
    needs: build
    runs-on: [self-hosted, linux, vctcn]
    steps:
      - name: Komodo UpdateStack — pin image tag
        env:
          KOMODO_URL: http://moat-app1.mouriya.lan:9120
          KOMODO_API_KEY: ${{ secrets.KOMODO_API_KEY }}
          KOMODO_API_SECRET: ${{ secrets.KOMODO_API_SECRET }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          curl -fsS -X POST "${KOMODO_URL}/write" \
            -H "x-api-key: ${KOMODO_API_KEY}" \
            -H "x-api-secret: ${KOMODO_API_SECRET}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg tag "$IMAGE_TAG" '{
              type: "UpdateStack",
              params: {
                id: "fulcrum",
                config: {
                  environment: ("FULCRUM_VERSION=" + $tag)
                }
              }
            }')"

      - name: Komodo DeployStack
        env:
          KOMODO_URL: http://moat-app1.mouriya.lan:9120
          KOMODO_API_KEY: ${{ secrets.KOMODO_API_KEY }}
          KOMODO_API_SECRET: ${{ secrets.KOMODO_API_SECRET }}
        run: |
          curl -fsS -X POST "${KOMODO_URL}/execute" \
            -H "x-api-key: ${KOMODO_API_KEY}" \
            -H "x-api-secret: ${KOMODO_API_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{"type":"DeployStack","params":{"stack":"fulcrum"}}'
